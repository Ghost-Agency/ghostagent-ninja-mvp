[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  included_files = ["app/api/surge/**"]

[functions."api/surge/launch"]
  timeout = 60

[dev]
  command = "npm run dev"
  port = 3000
